<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小红书爆款文案生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 24px;
      word-wrap: break-word;
    }

    .input-section {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result-section {
      margin-top: 25px;
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      word-wrap: break-word;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .result-item {
      background: #f8f9fa;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      word-wrap: break-word;
      overflow-wrap: break-word;
      line-height: 1.6;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    /* 标题特殊样式 */
    #titles .result-item {
      flex-direction: row;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 500;
    }

    #titles .result-item:hover {
      background: #667eea;
      color: white;
    }

    #titles .result-item:hover .copy-btn {
      background: white;
      color: #667eea;
    }

    /* 正文特殊样式 */
    #contents .result-item {
      flex-direction: column;
      align-items: flex-start;
    }

    .result-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .copy-btn {
      padding: 6px 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    /* 标题区的复制按钮 */
    #titles .copy-btn {
      padding: 5px 10px;
      font-size: 12px;
    }

    /* 正文区的复制按钮 */
    #contents .copy-btn {
      position: absolute;
      right: 10px;
      top: 10px;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 13px;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4caf50;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      bottom: 30px;
    }

    /* 移动端优化 */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 20px 15px;
        border-radius: 15px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .result-item {
        padding: 10px 12px;
        font-size: 13px;
      }

      #titles .result-item {
        font-size: 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      #titles .copy-btn {
        width: 100%;
        text-align: center;
      }

      .copy-btn {
        padding: 5px 10px;
        font-size: 12px;
      }

      #contents .copy-btn {
        position: static;
        margin-top: 10px;
        width: 100%;
      }

      .section-title {
        font-size: 16px;
      }

      button {
        font-size: 16px;
        padding: 14px;
      }
    }

    /* 超小屏幕 */
    @media (max-width: 360px) {
      .container {
        padding: 15px 10px;
      }

      h1 {
        font-size: 18px;
      }

      .result-item {
        font-size: 12px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 小红书爆款文案生成器</h1>

    <div class="input-section">
      <label>关键词 <span style="font-size: 12px; color: #999;">必填</span></label>
      <input type="text" id="keyword" placeholder="例如：护肤、健身、美食">

      <label>风格 <span style="font-size: 12px; color: #999;">选填</span></label>
      <select id="style">
        <option value="种草">种草推荐</option>
        <option value="干货">干货分享</option>
        <option value="测评">产品测评</option>
        <option value="教程">教程指南</option>
        <option value="避坑">避坑指南</option>
        <option value="好物">好物推荐</option>
        <option value="穿搭">穿搭OOTD</option>
        <option value="美妆">美妆护肤</option>
        <option value="美食">美食探店</option>
        <option value="家居">家居好物</option>
        <option value="学习">学习方法</option>
        <option value="职场">职场干货</option>
        <option value="情感">情感共鸣</option>
        <option value="健身">健身运动</option>
        <option value="理财">理财搞钱</option>
        <option value="旅行">旅行攻略</option>
        <option value="萌宠">萌宠日常</option>
        <option value="生活">生活记录</option>
      </select>

      <label>备注提示词 <span style="font-size: 12px; color: #999;">选填</span></label>
      <input type="text" id="customPrompt" placeholder="例如：强调适合学生党、提到具体的品牌、分享踩坑经历等">

      <button onclick="generate()" id="generateBtn">✨ 生成文案</button>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>AI正在创作中...</p>
    </div>

    <div id="result" class="result-section">
      <div class="section-title">📌 标题建议</div>
      <div id="titles"></div>

      <div class="section-title">📝 正文内容</div>
      <div id="contents"></div>

      <div class="section-title">🏷️ 推荐标签</div>
      <div id="tags" class="tags-container"></div>
    </div>
  </div>

  <div id="toast" class="toast">已复制到剪贴板！</div>

  <script>
    async function generate() {
      const keyword = document.getElementById('keyword').value.trim();
      const style = document.getElementById('style').value;
      const customPrompt = document.getElementById('customPrompt').value.trim();

      if (!keyword) {
        alert('请输入关键词');
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').classList.remove('show');

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ keyword, style, customPrompt }),
        });

        // 获取API响应
      const data = await response.json();
      
      // 添加随机种子确保每次不同
      const timestamp = Date.now();
      const randomSeed = Math.random().toString(36).substring(7);
      
      // 如果API失败，使用更多样的备用内容
      if (!data.success || !data.data) {
        const fallbackContents = generateFallbackContents(keyword, style, randomSeed);
        return res.json({
          success: true,
          data: {
            titles: generateFallbackTitles(keyword, randomSeed),
            contents: fallbackContents,
            tags: generateFallbackTags(keyword, randomSeed)
          }
        });
      }
      
      res.json(data);
    } catch (error) {
      console.error('生成失败:', error);
      
      // 即使出错也返回多样化内容
      const randomSeed = Math.random().toString(36).substring(7);
      res.json({
        success: true,
        data: {
          titles: generateFallbackTitles(keyword, randomSeed),
          contents: generateFallbackContents(keyword, style, randomSeed),
          tags: generateFallbackTags(keyword, randomSeed)
        }
      });
    }
  });

// 生成多样化的备用标题
function generateFallbackTitles(keyword, seed) {
  const templates = [
    `❓ 为什么你的${keyword}没效果？真相在这`,
    `🤔 ${keyword}智商税？看完这篇再说`,
    `😱 ${keyword}的第${Math.floor(Math.random()*10)+1}个秘密`,
    `⚠️ 别买${keyword}！先看完这篇`,
    `💡 才发现！${keyword}还能这样用？`,
    `🔥 ${keyword}测评：第${Math.floor(Math.random()*5)+1}个让我震惊`,
    `❌ ${keyword}没用？那是你没看这篇`,
    `😤 ${keyword}的真相，${Math.floor(Math.random()*20)+1}岁才知道`,
    `🤫 ${keyword}的秘密，商家不会告诉你`,
    `🤔 你真的会用${keyword}吗？`
  ];
  return templates.sort(() => Math.random() - 0.5);
}

// 生成多样化的备用正文
function generateFallbackContents(keyword, style, seed) {
  const times = ['3天', '1周', '1个月', '30天', '90天'];
  const people = ['闺蜜', '同事', '妈妈', '朋友', '网友'];
  const emotions = ['绝了', '破防', '真香', '震惊', '后悔', '笑死'];
  const numbers = ['3个', '5种', '10倍', '50%', '100块', '无数'];
  
  const randomTime = times[Math.floor(Math.random() * times.length)];
  const randomPerson = people[Math.floor(Math.random() * people.length)];
  const randomEmotion = emotions[Math.floor(Math.random() * emotions.length)];
  const randomNumber = numbers[Math.floor(Math.random() * numbers.length)];
  
  return [
    `===第一篇===\n\n家人们！我真的会谢🙏这个${keyword}让我${randomEmotion}了！\n\n用了${randomTime}，我${randomPerson}都说我状态完全不一样了😭\n\n说真的，一开始我觉得这就是个智商税💔结果试了一次...真的破防了！\n\n给你们${randomNumber}真实体验：\n✅ 效果明显\n✅ 性价比高\n✅ 容易上手\n\n最绝的是...我妈都夸我会买！🎉\n\n这个${keyword}真的绝了😭家人们快冲！\n\n有问题评论区问我～\n\n#${keyword} #好物 #真心推荐 #种草`,
    
    `===第二篇===\n\n救命🆘这个${keyword}让我后悔了...\n\n后悔没有早点买！！！😭😭😭\n\n姐妹们听我说！我之前踩了好多坑💔\n直到发现了这个${keyword}！\n\n说真的，一开始我也觉得"这不就是..."\n结果试了一次...我真的破防了😭\n\n看到效果：\n第${Math.floor(Math.random()*7)+1}天：感觉还行的样子\n第${Math.floor(Math.random()*20)+7}天：已经离不开它了\n第${Math.floor(Math.random()*30)+20}天：我朋友都问我用的什么\n\n这个${keyword}我给💯分！不接受反驳！\n\n家人们快去冲！💪\n\n评论区告诉我你们用了多久了～👇\n\n#${keyword} #真实体验 #好物 #测评`,
    
    `===第三篇===\n\n${keyword}天花板级别‼️这个必须收藏！\n\n家人们谁懂啊！这个${keyword}我真的用到老！🔥\n\n我花了${randomTime}研究这个${keyword}📚\n终于找到了最优解！✨\n\n说句大实话：\n❌ 90%的人都用错了\n✅ 正确的方法效果翻${randomNumber}\n\n举个真实例子：\n我${randomPerson}之前一直吐槽${keyword}🙄\n结果我教她正确方法后...她现在比我还积极！😂\n\n这个${keyword}真的绝了😭\n✅ 新手友好\n✅ 性价比超高\n✅ 效果立竿见影\n\n家人们别再交智商税了💰\n\n💡记得点赞收藏⭐不然刷着刷着就找不到了！\n\n#${keyword} #干货 #避坑指南 #好物分享`
  ];
}

// 生成多样化的备用标签
function generateFallbackTags(keyword, seed) {
  const baseTags = [`#${keyword}`, `#${keyword}分享`, `#${keyword}推荐`];
  const hotTags = ['#小红书', '#干货', '#种草', '#好物', '#日常', '#生活', '#笔记', '#真心推荐', '#测评'];
  
  // 随机选择7个热门标签
  const selectedHotTags = hotTags
    .sort(() => Math.random() - 0.5)
    .slice(0, 7);
  
  return [...baseTags, ...selectedHotTags];

      document.getElementById('loading').style.display = 'none';
    }

    function displayResults(data) {
      // 显示标题
      const titlesDiv = document.getElementById('titles');
      titlesDiv.innerHTML = data.titles.map((title, i) => `
        <div class="result-item">
          ${escapeHtml(title)}
          <button class="copy-btn" onclick="copyText('${escapeHtml(title).replace(/'/g, "\\'")}')">复制</button>
        </div>
      `).join('');

      // 显示正文
      const contentsDiv = document.getElementById('contents');
      contentsDiv.innerHTML = data.contents.map((content, i) => `
        <div class="result-item">
          <strong>方案 ${i + 1}</strong>
          <div style="margin-top: 10px; white-space: pre-wrap; word-wrap: break-word;">${escapeHtml(content)}</div>
          <button class="copy-btn" onclick="copyText(\`${escapeHtml(content).replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`)">复制</button>
        </div>
      `).join('');

      // 显示标签
      const tagsDiv = document.getElementById('tags');
      tagsDiv.innerHTML = data.tags.map(tag => `
        <span class="tag">${escapeHtml(tag)}</span>
      `).join('');

      document.getElementById('result').classList.add('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyText(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast();
        }).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast();
      } catch (err) {
        alert('复制失败，请手动复制');
      }
      document.body.removeChild(textarea);
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 回车生成
    document.getElementById('keyword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        generate();
      }
    });
  </script>
</body>
</html>
