<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小红书爆款文案生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 24px;
      word-wrap: break-word;
    }

    .input-section {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result-section {
      margin-top: 25px;
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      word-wrap: break-word;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .result-item {
      background: #f8f9fa;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      word-wrap: break-word;
      overflow-wrap: break-word;
      line-height: 1.6;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    /* 标题特殊样式 */
    #titles .result-item {
      flex-direction: row;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 500;
    }

    #titles .result-item:hover {
      background: #667eea;
      color: white;
    }

    #titles .result-item:hover .copy-btn {
      background: white;
      color: #667eea;
    }

    /* 正文特殊样式 */
    #contents .result-item {
      flex-direction: column;
      align-items: flex-start;
    }

    .result-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .copy-btn {
      padding: 6px 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    /* 标题区的复制按钮 */
    #titles .copy-btn {
      padding: 5px 10px;
      font-size: 12px;
    }

    /* 正文区的复制按钮 */
    #contents .copy-btn {
      position: absolute;
      right: 10px;
      top: 10px;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 13px;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4caf50;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      bottom: 30px;
    }

    /* 移动端优化 */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 20px 15px;
        border-radius: 15px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .result-item {
        padding: 10px 12px;
        font-size: 13px;
      }

      #titles .result-item {
        font-size: 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      #titles .copy-btn {
        width: 100%;
        text-align: center;
      }

      .copy-btn {
        padding: 5px 10px;
        font-size: 12px;
      }

      #contents .copy-btn {
        position: static;
        margin-top: 10px;
        width: 100%;
      }

      .section-title {
        font-size: 16px;
      }

      button {
        font-size: 16px;
        padding: 14px;
      }
    }

    /* 超小屏幕 */
    @media (max-width: 360px) {
      .container {
        padding: 15px 10px;
      }

      h1 {
        font-size: 18px;
      }

      .result-item {
        font-size: 12px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 小红书爆款文案生成器</h1>

    <div class="input-section">
      <label>关键词</label>
      <input type="text" id="keyword" placeholder="例如：护肤、健身、美食">

      <label>风格</label>
      <select id="style">
        <option value="种草">种草推荐</option>
        <option value="干货">干货分享</option>
        <option value="测评">产品测评</option>
        <option value="教程">教程指南</option>
      </select>

      <button onclick="generate()">✨ 生成文案</button>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>AI正在创作中...</p>
    </div>

    <div id="result" class="result-section">
      <div class="section-title">📌 标题建议</div>
      <div id="titles"></div>

      <div class="section-title">📝 正文内容</div>
      <div id="contents"></div>

      <div class="section-title">🏷️ 推荐标签</div>
      <div id="tags" class="tags-container"></div>
    </div>
  </div>

  <div id="toast" class="toast">已复制到剪贴板！</div>

  <script>
    async function generate() {
      const keyword = document.getElementById('keyword').value.trim();
      const style = document.getElementById('style').value;

      if (!keyword) {
        alert('请输入关键词');
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').classList.remove('show');

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ keyword, style }),
        });

        const data = await response.json();

        if (data.success) {
          displayResults(data.data);
        } else {
          alert('生成失败：' + data.error);
        }
      } catch (error) {
        console.error('请求失败:', error);
        alert('生成失败，请重试');
      }

      document.getElementById('loading').style.display = 'none';
    }

    function displayResults(data) {
      // 显示标题
      const titlesDiv = document.getElementById('titles');
      titlesDiv.innerHTML = data.titles.map((title, i) => `
        <div class="result-item">
          ${escapeHtml(title)}
          <button class="copy-btn" onclick="copyText('${escapeHtml(title).replace(/'/g, "\\'")}')">复制</button>
        </div>
      `).join('');

      // 显示正文
      const contentsDiv = document.getElementById('contents');
      contentsDiv.innerHTML = data.contents.map((content, i) => `
        <div class="result-item">
          <strong>方案 ${i + 1}</strong>
          <div style="margin-top: 10px; white-space: pre-wrap; word-wrap: break-word;">${escapeHtml(content)}</div>
          <button class="copy-btn" onclick="copyText(\`${escapeHtml(content).replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`)">复制</button>
        </div>
      `).join('');

      // 显示标签
      const tagsDiv = document.getElementById('tags');
      tagsDiv.innerHTML = data.tags.map(tag => `
        <span class="tag">${escapeHtml(tag)}</span>
      `).join('');

      document.getElementById('result').classList.add('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyText(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast();
        }).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast();
      } catch (err) {
        alert('复制失败，请手动复制');
      }
      document.body.removeChild(textarea);
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 回车生成
    document.getElementById('keyword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        generate();
      }
    });
  </script>
</body>
</html>
